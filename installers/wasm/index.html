<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Othello Sensei WASM</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>
<body>

<h2>Othello Sensei</h2>
<div id="status">WASM Loading...</div>

<div class="controls">
  <button onclick="handleAction('newGame')" title="New Game">
    <span class="material-symbols-rounded">restart_alt</span>
  </button>
  <button onclick="handleAction('toLastImportantNode')" title="First Position">
    <span class="material-symbols-rounded">keyboard_double_arrow_left</span>
  </button>
  <button onclick="handleAction('undo')" title="Undo">
    <span class="material-symbols-rounded">chevron_left</span>
  </button>
  <button onclick="handleAction('redo')" title="Redo">
    <span class="material-symbols-rounded">chevron_right</span>
  </button>
  <button onclick="handleAction('stop')" title="Stop">
    <span class="material-symbols-rounded">stop</span>
  </button>
</div>

<div class="board" id="othello-board">
</div>

<div class="stats-container">
  <div class="stats-row">
    <span id="stat-positions"></span>
    <span id="stat-pos-sec"></span>
  </div>
  <div class="stats-row">
    <span id="stat-time"></span>
    <span id="stat-empties">Empties: 60</span>
  </div>
</div>

<!--Enables using Sensei in GitHub. Remove this line if you don't run this page in GitHub-->
<script src="third_party/coi-serviceworker.js"></script>
<!--Loads the Sensei engine-->
<script src="wasm_bindings.js"></script>
<!--Renders Sensei's evaluations in the web page-->
<script src="app.js"></script>

</body>
</html>
