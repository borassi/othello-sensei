<!DOCTYPE html><html lang="en">
<head>
  <!--Enables using Sensei in GitHub. Remove this line if you don't run this page on GitHub-->
  <script src="coi-serviceworker.js"></script>
  <!--Renders Sensei's evaluations in the web page-->
  <script type="module" src="minimal.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Othello Sensei WASM</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
</head><body>

<h2>Othello Sensei</h2>
<div id="status">WASM Loading...</div>


<div class="container">
  <div id="examples">
    Examples:<br><br>
    e6f4c3c4d3<br><br>
    --------<br>
    --------<br>
    --------<br>
    ---OX---<br>
    ---XO---<br>
    --------<br>
    --------<br>
    --------
  </div>

  <textarea id="board-input" placeholder="Paste board string or move sequence..."></textarea>

  <div class="button-row">
    <button class="action-button" id="analyze-btn">Run</button>
    <button class="action-button" id="stop-btn">Stop</button>
  </div>

  <div class="evaluation-card">
    <div class="evaluation-header">Current Analysis</div>
    <div id="evaluation-value">-</div>
  </div>
</div>

<script type="module" src="minimal.js"></script>
</body>
</html>
